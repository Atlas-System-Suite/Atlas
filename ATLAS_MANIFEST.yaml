  - finance
  - reading
  - journal
  - college
  - projects
  - knowledge
  - calendar
  - nutrition
  - habits
  - developer
  - robotics
compatible_apps:
  - lifeos
  - web
  - desktop
  - mobile
  - cli
  - server
